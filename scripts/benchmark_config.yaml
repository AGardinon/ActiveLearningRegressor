# ------------------------------------------------------------------------------
# Benchmark configuration file for Active Learning Regressor experiments
# ------------------------------------------------------------------------------
SEED: null

experiment_name: "6D/ackley_gpr_10cy_2pts_1stage_1_1_adaptive_refinement_test_newpipeline"
experiment_notes: "Benchmarking the Ackley 6D function"

# --------------------------------------------------------------
# Function settings
function_parameters:
  function: "Ackley6D"  # "Hartmann" or "Ackley" or "StyblinskiTang"
  custom: False  # whether to use a custom function defined in a separate file (if true, the 'function' parameter will be ignored and the function will be imported from the specified file)
  n_dimensions: null  # number of dimensions of the function (if null, it will be inferred from the bounds or from the ground truth file if provided)
  bounds: null  # bounds of the function (if null, it will be inferred from the ground truth file if provided or set to default bounds for the selected function)

# --------------------------------------------------------------
# Ground truth data configuration
ground_truth_file: null #"hartmann3d_lhs.csv"
experiment_evidence: null

# --------------------------------------------------------------
# Train set configuration (initial points)
train_set_parameters:
  n_samples: 50000
  method: "lhs"
  val_size: null
  negate: true
  noise_std: 0.0

search_space_variables:
  - "x1"
  - "x2"
  - "x3"
  - "x4"
  - "x5"
  - "x6"

target_variables:
  - "y"

# --------------------------------------------------------------
# Data scaling configuration
data_scaler: "StandardScaler"
scaler_params: null

# --------------------------------------------------------------
# Adaptive refinement configuration
adaptive_refinement: # refinement parameters disabled if null
  method: 'lhs'  # method to sample the points for the refinement (either 'lhs' or 'sobol')
  negate: true
  refinement_noise_std: 0.0
  refinement_step: 4  # number of points acquired after which to perform refinement
  refinement_centroids: 3  # number of centroids to use for the refinement (chosen via fps)
  refinement_batch_size: 500  # number of points to sample around each centroid during refinement
  half_side_length_strategy: 'density'  # strategy to determine the half-side length of the hypercube around each centroid (either 'fixed' or 'density')
  half_side_length_strategy_params:  # parameters for the half-side length strategy (if using 'fixed', provide 'base_fraction'; if using 'density', provide 'density_scale' and 'max_half_side')
    base_fraction: 0.3
    k_neighbors: 5
    density_scale: 0.5
    max_half_side: 0.5
  refinement_filtering_min_distance: 0.0001  # minimum distance from existing points for refined points to be kept (in the scaled space)

# --------------------------------------------------------------
# Cycles parameters
n_cycles: 10
init_batch_size: 2
init_sampling: "random"

# --------------------------------------------------------------
# ML model configuration
ml_model: "GPR"

model_parameters:
  kernel_recipe: "MATERN_W"  # for GPR either "RBF_W" or "MATERN_W" or custom recipe
  n_restarts_optimizer: 300
  alpha: 1e-10
  normalize_y: true
  optimizer: 'fmin_l_bfgs_b'
  use_gridsearch: false
  log_transform: false

# --------------------------------------------------------------
# Acquisition functions configuration
acquisition_parameters:
  - acquisition_mode: "expected_improvement"

  - acquisition_mode: "target_expected_improvement_800"
    y_target: 
    epsilon: 150

  - acquisition_mode: "maximum_predicted_value"

  - acquisition_mode: "exploration_mutual_info"

  - acquisition_mode: "percentage_target_expected_improvement"
    percentage: 80

  - acquisition_mode: "random"

landscape_penalization: null  # radius: 0.25, strength: 1.0

batch_selection:
  # highest_landscape | constant_liar | kriging_believer | local_penalization
  method: "highest_landscape"
  method_params: # if `null` uses default params for the selected mode (see documentation for details)
    # eg. for highest_landscape:
    percentile: 95
    sampling_method: "voronoi"

# --------------------------------------------------------------
# Multi-stage acquisition protocol configuration
acquisition_protocol:
  stage_1:
    cycles: 100
    acquisition_modes: ['exploration_mutual_info', 'expected_improvement']
    n_points: [1, 1]  # Number of points to acquire for each mode in stage 1
  # stage_2:
  #   cycles: 40
  #   acquisition_modes: ['expected_improvement']
  #   n_points: [2]  # Number of points to acquire for each mode in stage 2
  # stage_3:
  #   cycles: 10
  #   acquisition_modes: ['exploration_mutual_info']
  #   n_points: [2]  # Number of points to acquire for each mode in stage 3
  # stage_4:
  #   cycles: 20
  #   acquisition_modes: ['expected_improvement']
  #   n_points: [2]  # Number of points to acquire for each mode in stage 4

